name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust check + fmt + test ─────────────────────────────────────
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          cache: true

      - name: Install system deps (Pingora + sqlx)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev pkg-config

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  # ── Frontend build + lint ───────────────────────────────────────
  admin-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install + build
        run: |
          npm ci
          npm run build
        working-directory: admin-web

  # ── Docker build (main only, no push) ────────────────────────────
  docker:
    if: github.ref == 'refs/heads/main'
    needs: [rust, admin-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build gateway image
        run: docker build -f gateway/Dockerfile -t llm-gateway/pingora-gateway:${{ github.sha }} .

      - name: Build admin-api image
        run: docker build -f admin-api/Dockerfile -t llm-gateway/admin-api:${{ github.sha }} .

      - name: Build admin-web image
        run: docker build -f admin-web/Dockerfile -t llm-gateway/admin-web:${{ github.sha }} .
