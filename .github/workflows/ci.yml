name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/rustgateway

jobs:
  # ── Rust check + fmt + test ─────────────────────────────────────
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          cache: true

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake libssl-dev pkg-config

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # ── Frontend build ──────────────────────────────────────────────
  admin-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 26, cache: npm, cache-dependency-path: admin-web/package-lock.json }
      - run: npm ci && npm run build
        working-directory: admin-web

  # ── Docker build + push (main only) ─────────────────────────────
  docker:
    if: github.ref == 'refs/heads/main'
    needs: [rust, admin-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SHORT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Set SHORT_SHA (first 7 chars)
        run: echo "SHORT_SHA=${SHORT_SHA::7}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push gateway
        run: |
          docker build -f gateway/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gateway:${SHORT_SHA} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gateway:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gateway --all-tags

      - name: Build & push admin-api
        run: |
          docker build -f admin-api/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/admin-api:${SHORT_SHA} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/admin-api:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/admin-api --all-tags

      - name: Build & push admin-web
        run: |
          docker build -f admin-web/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/admin-web:${SHORT_SHA} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/admin-web:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/admin-web --all-tags
