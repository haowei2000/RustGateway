name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/rustgateway

jobs:
  # ── Rust check + fmt + test ─────────────────────────────────────
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          cache: true

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y cmake libssl-dev pkg-config

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # ── Frontend build ──────────────────────────────────────────────
  admin-web-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 26, cache: npm, cache-dependency-path: admin-web/package-lock.json }
      - run: npm ci && npm run build
        working-directory: admin-web

  # ── Docker build + push (main only, parallel matrix) ────────────
  docker:
    if: github.ref == 'refs/heads/main'
    needs: [rust, admin-web-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - context: .
            dockerfile: gateway/Dockerfile
            name: gateway
          - context: .
            dockerfile: admin-api/Dockerfile
            name: admin-api
          - context: .
            dockerfile: admin-web/Dockerfile
            name: admin-web
    steps:
      - uses: actions/checkout@v5

      - name: Set SHORT_SHA (first 7 chars)
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:${{ env.SHORT_SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Auto-deploy after docker push ───────────────────────────────
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [docker]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/llm-gateway

            echo "==> Pulling latest deploy config..."
            git pull

            echo "==> Pulling images..."
            docker compose -f deploy/docker-compose-vps.yml pull

            echo "==> Restarting services..."
            docker compose -f deploy/docker-compose-vps.yml up -d --remove-orphans

            echo "==> Waiting for healthy..."
            sleep 15

            echo "==> Status:"
            docker compose -f deploy/docker-compose-vps.yml ps

            echo "==> Pruning old images..."
            docker image prune -af
