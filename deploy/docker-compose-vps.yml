# VPS deployment — single server with Docker Compose + Caddy (auto HTTPS)
# Usage:
#   1. Edit DOMAINS below, point DNS to VPS IP
#   2. docker compose -f deploy/docker-compose-vps.yml up -d

x-domains: &domains
  API_DOMAIN: api.example.com
  ADMIN_DOMAIN: admin.example.com
  LLM_DOMAIN: llm.example.com

services:
  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: llm
      POSTGRES_PASSWORD: llm
      POSTGRES_DB: llm_gateway
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  gateway:
    image: ghcr.io/haowei2000/rustgateway/gateway:latest
    environment:
      DATABASE_URL: postgres://llm:llm@postgres:5432/llm_gateway
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
    depends_on: [postgres, redis]
    restart: unless-stopped

  admin-api:
    image: ghcr.io/haowei2000/rustgateway/admin-api:latest
    environment:
      DATABASE_URL: postgres://llm:llm@postgres:5432/llm_gateway
      REDIS_URL: redis://redis:6379
      DATABASE_AUTO_MIGRATE: "true"
      JWT_SECRET: "change-me-in-production"
      RUST_LOG: info
    depends_on: [postgres, redis]
    restart: unless-stopped

  admin-web:
    image: ghcr.io/haowei2000/rustgateway/admin-web:latest
    depends_on: [admin-api]
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:

