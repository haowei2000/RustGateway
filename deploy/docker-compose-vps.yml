# VPS deployment — single server with Docker Compose + Caddy (auto HTTPS)
# Usage:
#   1. Edit DOMAINS below, point DNS to VPS IP
#   2. docker compose -f deploy/docker-compose-vps.yml up -d

x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:
  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    logging: *logging
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: llm
      POSTGRES_PASSWORD: llm
      POSTGRES_DB: llm_gateway
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm -d llm_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *logging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *logging
    restart: unless-stopped

  gateway:
    image: ghcr.io/haowei2000/rustgateway/gateway:latest
    environment:
      DATABASE_URL: postgres://llm:llm@postgres:5432/llm_gateway
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    logging: *logging
    restart: unless-stopped

  admin-api:
    image: ghcr.io/haowei2000/rustgateway/admin-api:latest
    environment:
      DATABASE_URL: postgres://llm:llm@postgres:5432/llm_gateway
      REDIS_URL: redis://redis:6379
      DATABASE_AUTO_MIGRATE: "true"
      JWT_SECRET: "change-me-in-production"
      RUST_LOG: info
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    logging: *logging
    restart: unless-stopped

  admin-web:
    image: ghcr.io/haowei2000/rustgateway/admin-web:latest
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/admin/ | head -1 | grep -q html || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      admin-api: { condition: service_healthy }
    logging: *logging
    restart: unless-stopped

  # ── Nightly backup ──
  backup:
    image: postgres:16-alpine
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          echo "$$(date): running backup..."
          pg_dump -h postgres -U llm -d llm_gateway -Fc -f "/backups/llm_gateway_$$(date +%Y%m%d_%H%M).dump"
          # Keep only last 7 daily backups
          find /backups -name "*.dump" -mtime +7 -delete 2>/dev/null || true
          echo "$$(date): backup done, next in 24h"
          sleep 86400
        done
    environment:
      PGPASSWORD: llm
    volumes:
      - ./backups:/backups
    depends_on:
      postgres: { condition: service_healthy }
    logging: *logging
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
