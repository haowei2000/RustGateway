version: "3.9"

services:
  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: llm-pingora-gateway
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      GATEWAY_BIND_ADDR: 0.0.0.0:8080
      METRICS_BIND_ADDR: 0.0.0.0:9090
      REDIS_URL: redis://redis:6379
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_KEY_REF: ${OPENAI_KEY_REF:-}
      INTERNAL_API_KEYS: ${INTERNAL_API_KEYS:-}
      INTERNAL_API_KEY_HASHES: ${INTERNAL_API_KEY_HASHES:-}
    depends_on:
      - redis
    networks:
      - llm-gateway-net

  admin-api:
    build:
      context: ..
      dockerfile: admin-api/Dockerfile
    container_name: llm-admin-api
    ports:
      - "9000:9000"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      ADMIN_API_BIND_ADDR: 0.0.0.0:9000
      DATABASE_URL: postgres://llm:llm@postgres:5432/llm_gateway
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me}
    depends_on:
      - postgres
      - redis
    networks:
      - llm-gateway-net

  admin-web:
    build:
      context: ..
      dockerfile: admin-web/Dockerfile
    container_name: llm-admin-web
    ports:
      - "3000:80"
    depends_on:
      - admin-api
    networks:
      - llm-gateway-net

  redis:
    image: redis:7-alpine
    container_name: llm-redis
    ports:
      - "6379:6379"
    networks:
      - llm-gateway-net

  postgres:
    image: postgres:16-alpine
    container_name: llm-postgres
    environment:
      POSTGRES_USER: llm
      POSTGRES_PASSWORD: llm
      POSTGRES_DB: llm_gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    networks:
      - llm-gateway-net

volumes:
  postgres_data:

networks:
  llm-gateway-net:
    driver: bridge
