apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-gateway-config
data:
  GATEWAY_BIND_ADDR: "0.0.0.0:{{ .Values.gateway.containerPort }}"
  METRICS_BIND_ADDR: "0.0.0.0:{{ .Values.gateway.metricsPort }}"
  ADMIN_API_BIND_ADDR: "0.0.0.0:{{ .Values.adminApi.containerPort }}"
  RUST_LOG: "{{ .Values.gateway.env.RUST_LOG }}"
  DATABASE_MAX_CONNECTIONS: "{{ .Values.adminApi.env.DATABASE_MAX_CONNECTIONS }}"
  DATABASE_AUTO_MIGRATE: "{{ .Values.adminApi.env.DATABASE_AUTO_MIGRATE }}"
