global:
  imagePullPolicy: IfNotPresent
  domain: llm-gateway.local

gateway:
  image: llm-gateway/pingora-gateway:local
  replicas: 1
  serviceType: NodePort
  nodePorts:
    http: 30080
    metrics: 30909
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: false

adminApi:
  image: llm-gateway/admin-api:local
  replicas: 1
  serviceType: NodePort
  nodePort: 30900
  env:
    DATABASE_MAX_CONNECTIONS: "5"
    DATABASE_AUTO_MIGRATE: "true"
  secret:
    jwtSecret: local-dev-secret-change-me
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

adminWeb:
  image: llm-gateway/admin-web:local
  replicas: 1
  serviceType: NodePort
  nodePort: 30300

redis:
  mode: local
  urlSecretName: llm-gateway-secret
  urlSecretKey: REDIS_URL

database:
  mode: local
  urlSecretName: llm-gateway-secret
  urlSecretKey: DATABASE_URL
  local:
    persistence:
      enabled: true
      hostPath: /data/postgres

ingress:
  enabled: false
  tls:
    enabled: false

serviceMonitor:
  enabled: false
